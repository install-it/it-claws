name: Create Release

on:
  push:
    tags:
      - v*

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 15
    strategy:
      matrix:
        architecture: [i386, amd64]
        include:
          - architecture: i386
            build-arch: x86
            build-name: i386-windows
          - architecture: amd64
            build-arch: x64
            build-name: amd64-windows

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python environment
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          architecture: ${{ matrix.build-arch }}
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            uv.lock

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .
          pip install pyinstaller

      - name: Install UPX
        uses: crazy-max/ghaction-upx@v3
        with:
          install-only: true

      - name: Create Custom Mixed-Linkage Triplet
        run: |
          $arch = if ("${{ matrix.architecture }}" -eq "i386") { "x86" } else { "x64" }
          New-Item -ItemType Directory -Force -Path custom-triplets
          
          $tripletContent = @"
          set(VCPKG_TARGET_ARCHITECTURE $arch)
          set(VCPKG_CRT_LINKAGE dynamic)
          set(VCPKG_LIBRARY_LINKAGE static)
          if(PORT STREQUAL "libarchive")
              set(VCPKG_LIBRARY_LINKAGE dynamic)
          endif()
          "@
          
          $tripletContent | Out-File -FilePath "custom-triplets\mixed-windows.cmake" -Encoding ascii

      - name: Install Self-Contained libarchive via vcpkg
        run: |
          vcpkg install libarchive:mixed-windows --overlay-triplets=custom-triplets

      - name: Build the executable (Onedir mode)
        run: |
          pyinstaller .\src\it_claws\main.py -cD -n ${{ github.event.repository.name }} `
            --collect-all selenium --collect-all inquirer --copy-metadata readchar `
            --add-binary "C:/vcpkg/installed/mixed-windows/bin/libarchive.dll;bin/libarchive"

      - name: Package into zip
        run: |
          cd .\dist\
          7z a "${{ github.event.repository.name }}.${{ matrix.build-name }}.zip" ./${{ github.event.repository.name }} -mx9

      - name: Upload updater artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ github.event.repository.name }}.${{ matrix.architecture }}
          path: dist/${{ github.event.repository.name }}.${{ matrix.build-name }}.zip

  create-release:
    needs: [build]
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist/
          merge-multiple: true

      - name: Create GitHub release
        uses: ncipollo/release-action@v1.21.0
        with:
          artifacts: dist/*
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') }}
          generate_release_notes: true